name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        pip install -r starter/requirements.txt

    - name: Run flake8
      run: flake8 starter/ --exclude=starter/sanitycheck.py

    - name: Run pytest
      run: pytest